<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌞 阳光心理驿站</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
        body{background:linear-gradient(135deg,#669bee 0%,#84f0c4 100%);min-height:100vh;padding:20px}
        .container{max-width:700px;margin:auto}
        .card{background:white;padding:25px;border-radius:15px;margin-bottom:20px;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
        h1{color:white;text-align:center;margin:20px 0}
        h2{color:#4a7bd6;margin-bottom:15px;text-align:center}
        input,textarea,select{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px}
        button{background:linear-gradient(90deg,#4a90e2,#5ce0b4);color:white;border:none;padding:14px;width:100%;border-radius:10px;font-size:16px;margin-top:10px}
        .footer{text-align:center;color:white;margin-top:30px}
        #msg{text-align:center;margin-top:15px;font-size:16px}
        .success{color:#2d6a4f}
        .error{color:red}
    </style>
</head>
<body>
    <div class="container">
        <h1>🌞 阳光心理驿站</h1>

        <div class="card">
            <h2>心理信息提交</h2>
            <form id="myForm">
                <input type="text" placeholder="姓名（选填）" id="name">
                <input type="text" placeholder="班级" id="class">
                <input type="text" placeholder="联系方式（必填）" id="contact" required>
                <textarea rows="5" placeholder="请描述你的情况..." id="content" required></textarea>
                <select id="mood">
                    <option>平静</option>
                    <option>开心</option>
                    <option>焦虑</option>
                    <option>低落</option>
                </select>
                <button type="submit">提交信息</button>
                <div id="msg"></div>
            </form>
        </div>

        <div class="card">
            <h2>查看管理员回复</h2>
            <input type="text" id="checkContact" placeholder="输入联系方式查询">
            <button onclick="checkReply()">查询回复</button>
            <div id="result"></div>
        </div>

        <div class="footer">© 2025 阳光心理驿站</div>
    </div>

    <script>
        const API_BASE = '/.netlify/functions';

        // 提交表单（带成功/失败提示）
        const form = document.getElementById('myForm');
        const msg = document.getElementById('msg');

        form.onsubmit = async function(e) {
            e.preventDefault();

            const contact = document.getElementById('contact').value.trim();
            const content = document.getElementById('content').value.trim();

            if (!contact || !content) {
                msg.innerText = "❌ 提交失败：联系方式和内容不能为空";
                msg.className = "error";
                return;
            }

            const data = {
                name: document.getElementById('name').value || "匿名",
                class: document.getElementById('class').value || "未填写",
                contact: contact,
                content: content,
                mood: document.getElementById('mood').value
            };

            try {
                const res = await fetch(`${API_BASE}/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await res.json();
                if (result.success) {
                    msg.innerText = "✅ 提交成功！管理员会尽快回复你";
                    msg.className = "success";
                    form.reset();
                } else {
                    msg.innerText = "❌ 提交失败，请重试";
                    msg.className = "error";
                }
            } catch (error) {
                msg.innerText = "❌ 网络错误，请检查网络后重试";
                msg.className = "error";
            }
        };

        // 查询回复
        async function checkReply() {
            const contact = document.getElementById('checkContact').value.trim();
            const res = document.getElementById('result');

            if (!contact) {
                res.innerText = "请输入联系方式";
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/get-data`);
                const list = await response.json();
                const items = list.filter(i => i.contact === contact);

                if (items.length === 0) {
                    res.innerText = "未找到你的记录";
                    return;
                }

                let html = "";
                items.forEach(i => {
                    html += `
                        <div style="margin:10px 0;padding:10px;border-bottom:1px solid #ddd">
                            <p><strong>提交时间：</strong>${i.time}</p>
                            <p><strong>你的留言：</strong>${i.content}</p>
                            <p><strong>管理员回复：</strong>${i.reply || "暂未回复"}</p>
                        </div>
                    `;
                });

                res.innerHTML = html;
            } catch (error) {
                res.innerText = "查询失败，请重试";
            }
        }
    </script>
</body>
</html>
