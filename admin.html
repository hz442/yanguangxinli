<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:linear-gradient(135deg,#669bee 0%,#84f0c4 100%);padding:20px}
.container{max-width:900px;margin:auto}
.card{background:white;padding:20px;border-radius:15px;margin:10px 0}
h1{color:white;text-align:center;margin:20px 0}
input,textarea{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px}
button{background:#2d6a4f;color:white;border:none;padding:14px;width:100%;border-radius:10px;margin-top:10px}
.item{border-left:4px solid #4a90e2;padding:15px;background:#f9f9f9;margin-bottom:15px;border-radius:8px}
</style>
</head>
<body>
<div class="container">
<h1>🔒 管理员后台</h1>

<div class="card">
<input type="password" id="pwd" placeholder="输入管理员密码">
<button onclick="login()">登录</button>
</div>

<div id="adminArea" style="display:none">
<div id="list"></div>
</div>
</div>

<script>
const STORAGE_KEY = "mental_submissions";
const PWD = "123456";

function getList() {
return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
}

function saveList(list) {
localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

function login() {
if (document.getElementById("pwd").value === PWD) {
alert("登录成功");
document.getElementById("adminArea").style.display = "block";
loadList();
} else {
alert("密码错误");
}
}

function loadList() {
const list = getList();
const html = list.map((item, i) => `
<div class="item">
<p><strong>姓名：</strong>${item.name}</p>
<p><strong>班级：</strong>${item.class}</p>
<p><strong>联系方式：</strong>${item.contact}</p>
<p><strong>内容：</strong>${item.content}</p>
<p><strong>情绪：</strong>${item.mood}</p>
<p><strong>时间：</strong>${item.time}</p>
<textarea placeholder="输入回复" id="reply${i}">${item.reply || ''}</textarea>
<button onclick="sendReply(${i})">保存回复</button>
</div>
`).join('');
document.getElementById("list").innerHTML = html;
}

function sendReply(i) {
const list = getList();
list[i].reply = document.getElementById(`reply${i}`).value;
saveList(list);
alert("回复已保存");
loadList();
}
</script>
</body>
</html>
