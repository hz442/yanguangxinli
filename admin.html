<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 管理员后台</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
        body{background:linear-gradient(135deg,#669bee 0%,#84f0c4 100%);min-height:100vh;padding:20px}
        .container{max-width:1000px;margin:auto}
        .header{text-align:center;color:white;margin:30px 0}
        .login-card, .admin-content{background:white;padding:25px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
        .login-card h2, .admin-header h2{color:#4a7bd6;margin-bottom:20px;text-align:center}
        input,textarea{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px}
        button{background:linear-gradient(90deg,#4a90e2,#5ce0b4);color:white;border:none;padding:14px;border-radius:8px;cursor:pointer}
        .logout-btn{background:#ff4757}
        .admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .data-item{padding:15px;border-left:4px solid #4a90e2;background:#f9f9f9;border-radius:8px;margin-bottom:15px}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔒 管理员后台</h1>
        </div>

        <!-- 登录界面 -->
        <div class="login-card" id="loginCard">
            <h2>管理员登录</h2>
            <input type="password" id="adminPwd" placeholder="输入管理员密码">
            <button onclick="login()">登录</button>
        </div>

        <!-- 管理界面 -->
        <div class="admin-content" id="adminContent" style="display:none;margin-top:20px">
            <div class="admin-header">
                <h2>学生提交列表</h2>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
            <div id="dataList"></div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "123456"; // 可自行修改
        const DATA_URL = '/data.json';

        // 登录验证
        function login() {
            const pwd = document.getElementById('adminPwd').value;
            if (pwd === ADMIN_PASSWORD) {
                document.getElementById('loginCard').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadData();
            } else {
                alert('❌ 密码错误，请重试');
            }
        }

        // 加载所有数据
        async function loadData() {
            const listEl = document.getElementById('dataList');
            listEl.innerHTML = '<p>🔄 加载中...</p>';

            try {
                const res = await fetch(DATA_URL);
                const data = await res.json();

                if (data.length === 0) {
                    listEl.innerHTML = '<p>ℹ️ 暂无学生提交数据</p>';
                    return;
                }

                let html = '';
                data.forEach(item => {
                    html += `
                        <div class="data-item">
                            <h3>${item.name} | ${item.class}</h3>
                            <p><strong>联系方式：</strong>${item.contact}</p>
                            <p><strong>情绪：</strong>${item.mood}</p>
                            <p><strong>内容：</strong>${item.content}</p>
                            <p><strong>时间：</strong>${item.time}</p>
                            <div style="margin-top:10px">
                                <textarea id="reply-${item.id}" rows="3" placeholder="输入回复内容...">${item.reply || ''}</textarea>
                                <button onclick="sendReply('${item.id}')" style="margin-top:10px">保存回复</button>
                            </div>
                        </div>
                    `;
                });

                listEl.innerHTML = html;
            } catch (error) {
                listEl.innerHTML = '<p>❌ 数据加载失败，请重试</p>';
            }
        }

        // 发送回复
        async function sendReply(id) {
            const reply = document.getElementById(`reply-${id}`).value.trim();
            if (!reply) {
                alert('请输入回复内容');
                return;
            }

            // 本地存储+同步
            const res = await fetch(DATA_URL);
            const data = await res.json();
            const updatedList = data.map(item => 
                item.id === id ? { ...item, reply } : item
            );
            localStorage.setItem('mental_submissions', JSON.stringify(updatedList));

            alert('✅ 回复已保存');
            loadData();
        }

        // 退出登录
        function logout() {
            document.getElementById('adminContent').style.display = 'none';
            document.getElementById('loginCard').style.display = 'block';
            document.getElementById('adminPwd').value = '';
        }
    </script>
</body>
</html>
