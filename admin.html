<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 管理员后台</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
        body{background:linear-gradient(135deg,#669bee 0%,#84f0c4 100%);padding:20px}
        .container{max-width:1000px;margin:auto}
        .card{background:white;padding:25px;border-radius:15px;margin:10px 0}
        h1{color:white;text-align:center;margin:20px 0}
        input{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px}
        button{background:#2d6a4f;color:white;border:none;padding:14px;width:100%;border-radius:10px;margin-top:10px}
        .item{border-left:4px solid #4a90e2;padding:15px;background:#f9f9f9;margin-bottom:15px;border-radius:8px}
    </style>
</head>
<body>
    <div class="container">
        <h1>🔒 管理员后台</h1>

        <div class="card">
            <input type="password" id="pwd" placeholder="输入管理员密码">
            <button onclick="login()">登录</button>
        </div>

        <div id="adminArea" style="display:none">
            <div id="list"></div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "123456";
        const API_BASE = '/.netlify/functions';

        function login() {
            if (document.getElementById("pwd").value === ADMIN_PASSWORD) {
                alert("登录成功");
                document.getElementById("adminArea").style.display = "block";
                loadData();
            } else {
                alert("密码错误");
            }
        }

        async function loadData() {
            try {
                const res = await fetch(`${API_BASE}/get-data`);
                const list = await res.json();

                if (list.length === 0) {
                    document.getElementById("list").innerHTML = "<p>暂无学生提交数据</p>";
                    return;
                }

                const html = list.map((item, i) => `
                    <div class="item">
                        <p><strong>姓名：</strong>${item.name}</p>
                        <p><strong>班级：</strong>${item.class}</p>
                        <p><strong>联系方式：</strong>${item.contact}</p>
                        <p><strong>内容：</strong>${item.content}</p>
                        <p><strong>情绪：</strong>${item.mood}</p>
                        <p><strong>时间：</strong>${item.time}</p>
                        <textarea placeholder="输入回复" id="reply${i}">${item.reply || ''}</textarea>
                        <button onclick="saveReply(${i}, '${item.id}')">保存回复</button>
                    </div>
                `).join('');

                document.getElementById("list").innerHTML = html;
            } catch (err) {
                document.getElementById("list").innerHTML = "<p>加载失败</p>";
            }
        }

        async function saveReply(i, id) {
            const reply = document.getElementById(`reply${i}`).value.trim();
            if (!reply) return alert("请输入回复");

            try {
                await fetch(`${API_BASE}/reply`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, reply })
                });
                alert("回复已保存");
                loadData();
            } catch (err) {
                alert("保存失败");
            }
        }
    </script>
</body>
</html>
